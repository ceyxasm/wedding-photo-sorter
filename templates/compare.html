<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Results</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: ui-monospace, monospace;
    min-height: 100vh;
  }

  #header {
    position: sticky;
    top: 0;
    background: #0a0a0a;
    border-bottom: 1px solid #1c1c1c;
    padding: 12px 20px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 { font-size: 14px; color: #555; }

  #stats {
    display: flex;
    gap: 14px;
    font-size: 13px;
    margin-right: auto;
  }

  .stat-a { color: #22c55e; }
  .stat-r { color: #ef4444; }
  .stat-p { color: #444; }

  #filters { display: flex; gap: 6px; }

  .filter-btn {
    background: #141414;
    border: 1px solid #2a2a2a;
    color: #666;
    padding: 5px 13px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }

  .filter-btn.on { background: #2a2a2a; color: #eee; border-color: #444; }

  #btn-export {
    background: #22c55e;
    color: #000;
    border: none;
    padding: 6px 14px;
    font-size: 13px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
  }

  #btn-export:hover { background: #16a34a; }

  #live-badge {
    font-size: 11px;
    color: #333;
    padding: 3px 8px;
    border: 1px solid #222;
    border-radius: 10px;
  }

  #live-badge.fresh { color: #22c55e; border-color: #22c55e33; }

  /* grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 3px;
    padding: 12px;
  }

  .thumb {
    aspect-ratio: 3/2;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border-radius: 2px;
    background: #111;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s;
  }

  .thumb .badge {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    pointer-events: none;
  }

  .thumb:hover img { opacity: 0.8; }

  .thumb.accept { outline: 3px solid #22c55e; }
  .thumb.accept .badge { background: #22c55e; color: #000; }

  .thumb.reject { outline: 3px solid #ef4444; }
  .thumb.reject .badge { background: #ef4444; color: #fff; }

  .thumb.pending { opacity: 0.35; }

  .thumb.hide { display: none; }

  /* lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }

  #lightbox.visible { display: flex; }

  #lightbox img {
    max-width: 95vw;
    max-height: 90vh;
    object-fit: contain;
  }

  #lightbox-info {
    font-size: 12px;
    color: #555;
  }

  #lightbox-close {
    position: absolute;
    top: 14px;
    right: 18px;
    font-size: 26px;
    color: #555;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
  }

  #lightbox-close:hover { color: #fff; }
</style>
</head>
<body>

<div id="header">
  <h1>Review Results</h1>
  <div id="stats">
    <span class="stat-a">✓ <span id="cnt-a">0</span> accepted</span>
    <span class="stat-r">✕ <span id="cnt-r">0</span> rejected</span>
    <span class="stat-p">◌ <span id="cnt-p">0</span> not reviewed</span>
  </div>
  <div id="filters">
    <button class="filter-btn on" data-f="all">All</button>
    <button class="filter-btn" data-f="accept">Accepted</button>
    <button class="filter-btn" data-f="reject">Rejected</button>
    <button class="filter-btn" data-f="pending">Not reviewed</button>
  </div>
  <button id="btn-export">Export Accepted</button>
  <span id="live-badge">live</span>
</div>

<div id="grid"></div>

<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lb-img" src="" alt="">
  <span id="lightbox-info"></span>
</div>

<script>
  let review = null;
  let filter = 'all';

  function imgSrc(f) {
    return '/img/' + f.split('/').map(encodeURIComponent).join('/');
  }

  function thumbSrc(f) {
    return '/thumb/' + f.split('/').map(encodeURIComponent).join('/');
  }

  function basename(f) {
    return f.split('/').pop();
  }

  async function fetchState(silent) {
    const res = await fetch('/api/review/state');
    const fresh = await res.json();

    const changed = !review ||
      JSON.stringify(fresh.decisions) !== JSON.stringify(review.decisions);

    review = fresh;

    if (!silent || changed) render();

    const badge = document.getElementById('live-badge');
    if (changed && !silent) {
      badge.classList.add('fresh');
      setTimeout(() => badge.classList.remove('fresh'), 1500);
    }
  }

  function render() {
    const pool = review.pool;
    const dec = review.decisions;

    let a = 0, r = 0, p = 0;
    pool.forEach(f => {
      const d = dec[f];
      if (d === 'accept') a++;
      else if (d === 'reject') r++;
      else p++;
    });

    document.getElementById('cnt-a').textContent = a;
    document.getElementById('cnt-r').textContent = r;
    document.getElementById('cnt-p').textContent = p;

    const grid = document.getElementById('grid');
    // update existing thumbs or rebuild
    const existing = grid.querySelectorAll('.thumb');

    if (existing.length === pool.length) {
      // just update classes
      existing.forEach((div, i) => {
        const d = dec[pool[i]] || 'pending';
        div.className = 'thumb ' + d + (filter !== 'all' && filter !== d ? ' hide' : '');
        const badge = div.querySelector('.badge');
        if (badge) badge.textContent = d === 'accept' ? '✓' : d === 'reject' ? '✕' : '';
      });
    } else {
      // full rebuild
      grid.innerHTML = '';
      pool.forEach(filename => {
        const d = dec[filename] || 'pending';
        const div = document.createElement('div');
        div.className = 'thumb ' + d + (filter !== 'all' && filter !== d ? ' hide' : '');

        const img = document.createElement('img');
        img.src = thumbSrc(filename);
        img.loading = 'lazy';
        img.alt = '';

        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = d === 'accept' ? '✓' : d === 'reject' ? '✕' : '';

        div.appendChild(img);
        div.appendChild(badge);
        div.addEventListener('click', () => openLightbox(filename));
        grid.appendChild(div);
      });
    }
  }

  function openLightbox(filename) {
    const d = (review.decisions[filename] || 'not reviewed');
    document.getElementById('lb-img').src = imgSrc(filename);
    document.getElementById('lightbox-info').textContent =
      `${basename(filename)} — ${d}`;
    document.getElementById('lightbox').classList.add('visible');
  }

  document.getElementById('lightbox-close').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('visible');
    document.getElementById('lb-img').src = '';
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      document.getElementById('lightbox').classList.remove('visible');
      document.getElementById('lb-img').src = '';
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      render();
    });
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    window.open('/api/review/export', '_blank');
  });

  // auto-refresh every 20 seconds to pick up her new decisions
  setInterval(() => fetchState(true), 20000);

  fetchState(false);
</script>
</body>
</html>

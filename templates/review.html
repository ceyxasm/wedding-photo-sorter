<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Review Photos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    color: #fff;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* top bar */
  #top-bar {
    padding: 10px 16px 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #counter { font-size: 12px; color: #555; white-space: nowrap; min-width: 54px; }

  #progress-track {
    flex: 1;
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: #22c55e;
    border-radius: 2px;
    transition: width 0.2s;
  }

  #accepted-count { font-size: 12px; color: #22c55e; white-space: nowrap; min-width: 40px; text-align: right; }

  /* image area */
  #image-area {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #main-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  #decision-border {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border: 5px solid transparent;
    transition: border-color 0.15s;
  }

  #decision-border.accept { border-color: #22c55e; }
  #decision-border.reject { border-color: #ef4444; }

  /* done screen */
  #done-screen {
    display: none;
    position: absolute;
    inset: 0;
    background: #000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
  }

  #done-screen.visible { display: flex; }
  #done-screen h2 { font-size: 22px; color: #22c55e; }
  #done-screen p { color: #777; font-size: 14px; line-height: 1.6; }
  #done-screen small { color: #444; font-size: 12px; }

  /* bottom buttons — 4 in a row */
  #buttons {
    display: flex;
    gap: 8px;
    padding: 10px 16px 28px;
    flex-shrink: 0;
  }

  .btn {
    height: 68px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.15s;
    -webkit-user-select: none;
  }

  .btn:active { transform: scale(0.93); }

  /* nav buttons — narrower */
  .btn-nav {
    flex: 0 0 64px;
    background: #141414;
    color: #555;
    border-color: #222;
    font-size: 20px;
  }

  .btn-nav:active { background: #222; color: #fff; }

  /* decision buttons — fill remaining space */
  .btn-vote { flex: 1; }

  #btn-reject {
    background: #120000;
    color: #ef4444;
    border-color: #2a0000;
  }

  #btn-reject.active {
    background: #ef4444;
    color: #fff;
    border-color: #ef4444;
  }

  #btn-accept {
    background: #001200;
    color: #22c55e;
    border-color: #002a00;
  }

  #btn-accept.active {
    background: #22c55e;
    color: #000;
    border-color: #22c55e;
  }
</style>
</head>
<body>

<div id="top-bar">
  <span id="counter">— / —</span>
  <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
  <span id="accepted-count">✓ 0</span>
</div>

<div id="image-area">
  <img id="main-img" src="" alt="">
  <div id="decision-border"></div>
  <div id="done-screen">
    <h2>All done!</h2>
    <p id="done-text"></p>
    <small>Use ← to go back and change any decision.</small>
  </div>
</div>

<div id="buttons">
  <button class="btn btn-nav" id="btn-prev">&#8592;</button>
  <button class="btn btn-vote" id="btn-reject">✕</button>
  <button class="btn btn-vote" id="btn-accept">✓</button>
  <button class="btn btn-nav" id="btn-next">&#8594;</button>
</div>

<script>
  let review = null;
  let idx = 0;
  const preloaded = {};

  async function init() {
    const res = await fetch('/api/review/state');
    review = await res.json();
    idx = Math.min(review.last_index || 0, review.pool.length - 1);
    render();
  }

  function thumbSrc(f) {
    return '/thumb/' + f.split('/').map(encodeURIComponent).join('/');
  }

  function decision() {
    return review.decisions[review.pool[idx]] ?? null;
  }

  function acceptedCount() {
    return Object.values(review.decisions).filter(d => d === 'accept').length;
  }

  function render() {
    const pool = review.pool;
    const total = pool.length;
    const done = idx >= total;

    document.getElementById('counter').textContent = `${Math.min(idx + 1, total)} / ${total}`;
    document.getElementById('progress-fill').style.width = `${((idx + 1) / total) * 100}%`;
    document.getElementById('accepted-count').textContent = `✓ ${acceptedCount()}`;

    const doneScreen = document.getElementById('done-screen');
    if (done) {
      document.getElementById('done-text').textContent =
        `You accepted ${acceptedCount()} out of ${total} photos.`;
      doneScreen.classList.add('visible');
      return;
    }

    doneScreen.classList.remove('visible');

    const filename = pool[idx];
    const src = thumbSrc(filename);
    const mainImg = document.getElementById('main-img');
    if (mainImg.getAttribute('data-src') !== src) {
      mainImg.setAttribute('data-src', src);
      mainImg.src = src;
    }

    const d = decision();
    document.getElementById('decision-border').className = d ?? '';
    document.getElementById('btn-reject').classList.toggle('active', d === 'reject');
    document.getElementById('btn-accept').classList.toggle('active', d === 'accept');

    // preload next 2
    for (let i = 1; i <= 2; i++) {
      const next = pool[idx + i];
      if (next && !preloaded[next]) {
        const img = new Image();
        img.src = thumbSrc(next);
        preloaded[next] = true;
      }
    }
  }

  async function setDecision(value) {
    if (idx >= review.pool.length) return;
    const filename = review.pool[idx];
    const newDecision = decision() === value ? null : value;

    const res = await fetch('/api/review/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, decision: newDecision })
    });
    review = await res.json();
    render();
  }

  function navigate(dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx > review.pool.length) return;
    idx = newIdx;
    render();
    fetch('/api/review/position', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ last_index: idx })
    });
  }

  document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('btn-next').addEventListener('click', () => navigate(1));
  document.getElementById('btn-reject').addEventListener('click', () => setDecision('reject'));
  document.getElementById('btn-accept').addEventListener('click', () => setDecision('accept'));

  // Keyboard for desktop testing
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') navigate(1);
    else if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === 'Enter') setDecision('accept');
    else if (e.key === 'Backspace') { e.preventDefault(); setDecision('reject'); }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      fetch('/api/review/position', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ last_index: idx })
      });
    }
  });

  init();
</script>
</body>
</html>
